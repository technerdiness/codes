name: Sync Letroso Answer

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 12:05 AM, 12:10 AM, 12:15 AM, 12:20 AM, 12:25 AM IST
    # => 6:35 PM, 6:40 PM, 6:45 PM, 6:50 PM, 6:55 PM UTC on the previous day.
    - cron: "35,40,45,50,55 18 * * *"
    # 12:30 AM IST => 7:00 PM UTC on the previous day.
    - cron: "0 19 * * *"
    # 1:00 AM IST => 7:30 PM UTC on the previous day.
    - cron: "30 19 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-letroso-answer
  cancel-in-progress: false

jobs:
  sync-letroso:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_DB_SCHEMA: ${{ secrets.SUPABASE_DB_SCHEMA }}
      SUPABASE_LETROSO_ANSWERS_TABLE: ${{ secrets.SUPABASE_LETROSO_ANSWERS_TABLE }}
      WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
      WORDPRESS_APPLICATION_PASSWORD: ${{ secrets.WORDPRESS_APPLICATION_PASSWORD }}
      WORDPRESS_LETROSO_ARTICLE_URL: ${{ secrets.WORDPRESS_LETROSO_ARTICLE_URL }}
      WORDPRESS_LETROSO_MARKER_START: ${{ secrets.WORDPRESS_LETROSO_MARKER_START }}
      WORDPRESS_LETROSO_MARKER_END: ${{ secrets.WORDPRESS_LETROSO_MARKER_END }}
      WORDPRESS_UPDATE_TIMEZONE: ${{ secrets.WORDPRESS_UPDATE_TIMEZONE || 'Asia/Kolkata' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Letroso answer
        run: npm run reveal:letroso
